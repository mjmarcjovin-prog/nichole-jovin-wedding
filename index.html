<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Open Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: auto; /* ✅ allows full visibility */
}
``

:root {
  --vh: 100svh;
}

/* 🖼️ IMAGE BACKGROUND */
.image-bg {
  position: fixed;
  inset: 0;
  background: url("images/pink.png") center / contain no-repeat;
  background-color: #000; /* fill empty space */
}

.image-bg.fade-out {
  opacity: 0;
  transform: scale(1.05);
}

/* 🎥 VIDEO */
.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background-color: #000; /* fill empty space */
}

.video-bg.fade-in {
  opacity: 1;
}

/* 🌑 OVERLAY */
.video-overlay {
  position: fixed;
  inset: 0;
  height: var(--vh);
  background: rgba(0,0,0,.45);
  z-index: -2;
}

/* 🎬 VIDEO END TRANSITION */
.video-bg.video-end {
  animation: videoOutro 1.6s ease-in forwards;
}

.video-overlay.video-end {
  animation: overlayFade 1.6s ease-in forwards;
}

@keyframes videoOutro {
  to {
    transform: scale(1.12);
    opacity: 0;
    filter: blur(6px);
  }
}

@keyframes overlayFade {
  to {
    background: rgba(0,0,0,1);
  }
}
</style>
</head>

<body>

<!-- Backgrounds -->
<div class="image-bg"></div>

<video
  class="video-bg"
  muted
  playsinline
  preload="auto"
  id="bgVideo">
  <source src="images/pink.mp4" type="video/mp4">
</video>


<audio id="envelopeSound" preload="auto">
  <source src="music/envelope-open.mp3" type="audio/mpeg">
</audio>


<div class="video-overlay"></div>

<script>
const video = document.getElementById("bgVideo");
const overlay = document.querySelector(".video-overlay");
const imageBg = document.querySelector(".image-bg");
const sound = document.getElementById("envelopeSound");

let started = false;

function startInvitation() {
  if (started) return;
  started = true;

  /* 🎵 PLAY ENVELOPE SOUND */
  sound.currentTime = 0;
  sound.volume = 0.8; // adjust if needed
  sound.play().catch(() => {});

  /* 🎥 START VIDEO */
  imageBg.classList.add("fade-out");
  video.classList.add("fade-in");

  video.currentTime = 0;
  video.play();

  /* 🎬 VIDEO OUTRO */
  setTimeout(() => {
    video.classList.add("video-end");
    overlay.classList.add("video-end");
  }, 3000);

  /* ➡️ PAGE FADE + REDIRECT */
  setTimeout(() => {
    document.body.style.transition = "opacity 1s ease";
    document.body.style.opacity = "0";

    setTimeout(() => {
      window.location.href = "invite.html";
    }, 1000);
  }, 4700);
}

/* ✅ ANY interaction triggers once */
["click", "touchstart", "keydown"].forEach(event => {
  document.addEventListener(event, startInvitation, { once: true });
});
</script>

</body>
</html>

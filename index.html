<title>Jovin & Nichole | Wedding Invitation</title>

<style>

body::before {
  content: "";

  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2); /* adjust opacity */

/* ✅ Center Box */
/* ✅ Full page centering */
body {
  margin: 0;
  min-height: 100vh; /* important */
  background: url('images/sakura.mp4') no-repeat center center/cover;

  display: flex;
  justify-content: center;  /* horizontal */
  align-items: center;      /* vertical */

  font-family: Arial, sans-serif;
}

/* ✅ Center box */
<video autoplay muted loop playsinline id="bg-video">
  <source src="images/sakura.mp4" type="video/mp4">
</video>

.container {
  background: rgba(255, 255, 255, 0.88);
  padding: 25px 30px;
  border-radius: 20px;
  width: 320px;
  max-width: 90%; /* mobile safe */
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  
}
<button type="button" onclick="goBack()">Return</button>

/* RSVP form */
form {
  margin-top: 12px;
  text-align: left;
  color: #fb6f92;
}
button[type="button"] {
  background: #999;
}

button[type="button"]:hover {
  background: #777;
}
h1 {

}

input, select, textarea {

  border: 1px solid #ddd;
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 12px;
  font-size: 14px;
  color: #fb6f92;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 14px;
  background: #fb6f92;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #e85a80;
}
#returnBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 10;
  width: auto;        /* prevents full width */
  padding: 10px 18px;
  border-radius: 20px;
  background: #999;
  color: white;
}

#returnBtn:hover {
  background: #777;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="images/sakura.mp4" type="video/mp4">
</video>

<div class="container">
  <!-- your form -->
</div>

</body>

<body>

<div class="container">

<h1>GUEST RSVP</h1>

<form action="https://formspree.io/f/xykblldw" method="POST">

  <input type="text" name="name" required placeholder="Full Name">

  <select name="guests" id="guests" required>
    <option value="">Number of Guests</option>
    <option value="1">1 (Just me)</option>
    <option value="2">2 (Plus one)</option>
  </select>

  <div id="extraGuestField" style="display:none;">
    <input type="text" name="extra_guest_name" placeholder="Extra Attendee Full Name">
  </div>

  <input type="email" name="email" required placeholder="Your Email Address"/>

  <select name="attending" id="attending" required>
    <option value="">-- Please Choose --</option>
    <option value="Will Attend">Will Attend</option>
    <option value="Cannot Attend">Sorry, I can’t attend</option>
  </select>

  <textarea name="message" placeholder="Message (optional)"></textarea>

  <input type="hidden" name="_subject" value="New Wedding RSVP – Nichole & Jovin">

  <button type="submit" id="submitBtn">Submit RSVP</button>

  
  <button id="returnBtn" type="button" onclick="goBack()">Return</button>

</form>

</div>

<script>
const guestsSelect = document.getElementById("guests");
const extraGuestField = document.getElementById("extraGuestField");

guestsSelect.addEventListener("change", () => {
  if (guestsSelect.value === "2") {
    extraGuestField.style.display = "block";
  } else {
    extraGuestField.style.display = "none";
  }
});

const submitBtn = document.getElementById("submitBtn");

submitBtn.addEventListener("click", e => {
  const rect = submitBtn.getBoundingClientRect();
  sparkleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
});


function goBack() {
  window.location.href = "https://www.canva.com/design/DAHIVvaAmEI/W2L_okurI6JBwg3DwPrncA/edit";
}

</script>


</body>
</html>

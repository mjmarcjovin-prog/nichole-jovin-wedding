<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Jovin & Nichole | Wedding Invitation</title>

<style>

/* RSVP */
form {
  margin-top: 12px;
  text-align: left;
  color: #fb6f92;
}

input, select, textarea {
  width: 100%;
  border: 1px solid #ddd;
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 12px;
  font-size: 14px;
 color: #fb6f92;
}
</style>

<body>


<h1>GUEST RSVP</h1>

  <form
   
    action="https://formspree.io/f/xykblldw"
    method="POST"

    
  >
    <input type="text" name="name" required placeholder="Full Name">

    <select name="guests" id="guests" required>
  <option value="">Number of Guests</option>
  <option value="1">1 (Just me)</option>
  <option value="2">2 (Plus one)</option>
</select>



<div id="extraGuestField" style="display:none;">
  <input
    type="text"
    name="extra_guest_name"
    placeholder="Extra Attendee Full Name"
  >
</div>


  
<input
  type="email"
  name="email"
  required
  placeholder="Your Email Address"
/>



<select name="attending" id="attending" required>
  <option value="">-- Please Choose --</option>
  <option value="Will Attend">Will Attend</option>
  <option value="Cannot Attend">Sorry, I can’t attend</option>
</select>


<script>
  const guestsSelect = document.getElementById("guests");
  const extraGuestField = document.getElementById("extraGuestField");

  guestsSelect.addEventListener("change", () => {
    if (guestsSelect.value === "2") {
      extraGuestField.style.display = "block";
    } else {
      extraGuestField.style.display = "none";
    }
  });
</script>



    <textarea name="message" placeholder="Message (optional)"></textarea>

    <!-- Optional hidden subject line -->
    <input type="hidden" name="_subject" value="New Wedding RSVP – Nichole & Jovin">

    

<button type="submit" id="submitBtn">
   Submit RSVP
</button>


  </form>

<script>
  const submitBtn = document.getElementById("submitBtn");

  submitBtn.addEventListener("click", e => {
    const rect = submitBtn.getBoundingClientRect();
    sparkleBurst(
      rect.left + rect.width / 2,
      rect.top + rect.height / 2
    );
  });
</script>


</div>




</body>
</html>

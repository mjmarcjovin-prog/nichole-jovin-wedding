<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Open Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* 🎥 VIDEO BACKGROUND */
.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -3;
}

.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: -2;
}


/* CENTER CONTENT */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 120px; /* adjust this value */
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 🖼️ IMAGE BACKGROUND */
.image-bg {
  position: fixed;
  inset: 0;
  background: url("images/pink.png") center / cover no-repeat;
  z-index: -4;
  opacity: 1;
  transition: opacity 1.4s ease, transform 1.8s ease;
}

.image-bg.fade-out {
  opacity: 0;
  transform: scale(1.05);
}

/* 🎥 VIDEO BACKGROUND */
.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -3;
  opacity: 0;
  transition: opacity 1.4s ease;
}

.video-bg.fade-in {
  opacity: 1;
}


/* ✅ OPEN INVITATION BUTTON */
.open-btn {
  padding: 14px 36px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #fff;
  background: linear-gradient(135deg, #fb6f92, #ff8fab);
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(0,0,0,.3);
  transition: transform .25s ease, box-shadow .25s ease;
}

.open-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 36px rgba(0,0,0,.35);
}

/* 🎬 VIDEO END TRANSITION */
.video-bg.video-end {
  animation: videoOutro 1.6s ease-in forwards;
}

.video-overlay.video-end {
  animation: overlayFade 1.6s ease-in forwards;
}

@keyframes videoOutro {
  0% {
    transform: scale(1);
    opacity: 1;
    filter: blur(0);
  }
  100% {
    transform: scale(1.12);
    opacity: 0;
    filter: blur(6px);
  }
}

@keyframes overlayFade {
  0% {
    background: rgba(0,0,0,.45);
  }
  100% {
    background: rgba(0,0,0,1);
  }
}
/* ✅ BUTTON FADE OUT */
.open-btn.fade-out {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  pointer-events: none;
}







</style>
</head>

<body>

<!-- 🖼️ Background image -->
<div class="image-bg"></div>

<!-- 🎥 Background video -->
<video class="video-bg" muted loop playsinline preload="auto" id="bgVideo">
  <source src="images/pinkenvelope.mp4" type="video/mp4">
</video>

<div class="video-overlay"></div>

<div class="hero">
  <div class="card">
    <button class="open-btn" id="openInvitation">
      Open Invitation
    </button>
  </div>
</div>

<script>
  const btn = document.getElementById("openInvitation");
  const video = document.getElementById("bgVideo");
  const overlay = document.querySelector(".video-overlay");
  const imageBg = document.querySelector(".image-bg");

  btn.addEventListener("click", () => {

    // Fade button
    btn.classList.add("fade-out");

    // 🔁 Switch background
    imageBg.classList.add("fade-out");
    video.classList.add("fade-in");

    video.currentTime = 0;
    video.play();

    // 🎬 Video outro
    setTimeout(() => {
      video.classList.add("video-end");
      overlay.classList.add("video-end");
    }, 3000);

    // ✅ Page fade & redirect
    setTimeout(() => {
      document.body.style.transition = "opacity 1s ease";
      document.body.style.opacity = "0";

      setTimeout(() => {
        window.location.href = "invite.html";
      }, 1000);
    }, 4700);

  });
</script>

</body>
</html>

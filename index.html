/* --- MINI EQUALIZER --- */


.eq span {
  width: 4px;
  height: 8px;
  background: #fff;
  border-radius: 4px;
  opacity: 0.85;
  animation: eqMove 1s infinite ease-in-out;
}

.eq span:nth-child(1) { animation-delay: 0s; }
.eq span:nth-child(2) { animation-delay: .15s; }
.eq span:nth-child(3) { animation-delay: .3s; }

@keyframes eqMove {
  0%, 100% { height: 6px; }
  50% { height: 14px; }
}

/* --- BPM SYNCED PULSE --- */
.music-btn.playing {
  animation: bpmPulse var(--bpm) ease-in-out infinite;
}

@keyframes bpmPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* --- FLOATING MUSIC NOTES --- */
.music-note {
  position: fixed;
  font-size: 16px;
  color: rgba(255, 182, 193, 0.85);
  pointer-events: none;
  animation: noteFloat 3s ease-out forwards;
  z-index: 9999;
}

@keyframes noteFloat {
  from {
    opacity: 1;
    transform: translate(0, 0) scale(1);
  }
  to {
    opacity: 0;
    transform: translate(-20px, -120px) scale(1.3);
  }
}
.music-btn.playing {
  animation: bpmPulse var(--bpm) ease-in-out infinite;
}
/* --- PAUSED STATE --- */
.music-btn.paused {
  animation: pausedWiggle 0.4s ease;
}

@keyframes pausedWiggle {
  0% { transform: rotate(0); }
  25% { transform: rotate(-8deg); }
  50% { transform: rotate(8deg); }
  100% { transform: rotate(0); }
}

/* Stop EQ when paused */
.music-btn.paused .eq span {
  animation: none;
  height: 4px;
  opacity: 0.5;

  const cd = document.getElementById("countdown");

  setInterval(() => {
    const now = Date.now();

document.querySelectorAll(".time-box span").forEach(el => {

<script>
  const music = document.getElementById("bgMusic");
  const toggle = document.getElementById("musicToggle");

  const BPM = 96; // 🎼 change if needed
  toggle.style.setProperty("--bpm", `${60 / BPM}s`);

  let isPlaying = false;
  let noteInterval;

  function spawnMusicNote() {
    const note = document.createElement("div");
    note.className = "music-note";
    note.textContent = Math.random() > 0.5 ? "🎵" : "🎶";

    const rect = toggle.getBoundingClientRect();
    note.style.left = rect.left + rect.width / 2 + "px";
    note.style.top = rect.top + "px";

    document.body.appendChild(note);
    setTimeout(() => note.remove(), 3000);
  }

  function startNotes() {
    noteInterval = setInterval(spawnMusicNote, 900);
  }

  function stopNotes() {
    clearInterval(noteInterval);
  }

  const startMusic = () => {
    if (!isPlaying) {
      music.play().then(() => {
        isPlaying = true;
        toggle.classList.add("playing");
        toggle.classList.remove("paused");
        toggle.innerHTML = '<div class="eq"><span></span><span></span><span></span></div><i class="fa-solid fa-pause"></i>';
        startNotes();
      }).catch(() => {});
    }

    document.removeEventListener("click", startMusic);
    document.removeEventListener("touchstart", startMusic);
    document.removeEventListener("scroll", startMusic);
  };

  document.addEventListener("click", startMusic);
  document.addEventListener("touchstart", startMusic);
  document.addEventListener("scroll", startMusic);

  toggle.addEventListener("click", (e) => {
    e.stopPropagation();

    if (isPlaying) {
      music.pause();
      stopNotes();
      toggle.classList.remove("playing");
      toggle.classList.add("paused");
      toggle.innerHTML = '<div class="eq"><span></span><span></span><span></span></div><i class="fa-solid fa-music"></i>';
    } else {
      music.play();
      startNotes();
      toggle.classList.add("playing");
      toggle.classList.remove("paused");
      toggle.innerHTML = '<div class="eq"><span></span><span></span><span></span></div><i class="fa-solid fa-pause"></i>';
    }

    isPlaying = !isPlaying;
  });
</script>
